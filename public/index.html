<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whois</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    a {
      color: blue;
    }
  </style>
</head>

<body>
  <div style="display: flex">
    <input type="text" id="inputDomain" style="flex: 1" />
    <button type="button" id="searchDomain">Search</button>
  </div>
  <div style="display: flex; margin-top: 10px">
    <pre><a href="https://github.com/arineng/nicinfo">nicinfo</a> <span id="cliArg"></span></pre>
  </div>
  <script>
    const inputDomain = document.getElementById("inputDomain");
    const searchDomain = document.getElementById("searchDomain");
    const cliArg = document.getElementById("cliArg");

    searchDomain.onclick = () => {
      window.location.pathname = `/domain/${inputDomain.value}`;
    };

    const rdapUrl = new URL(window.location.href);
    rdapUrl.pathname = "/rdap"
    inputDomain.oninput = () => {
      cliArg.innerText = `-b ${rdapUrl.href} ${inputDomain.value}`
    }
  </script>
</body>

</html>
